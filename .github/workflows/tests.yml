name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: CI — taro
    runs-on: ubuntu-latest

    steps:
      # ── 1. Clone vbwd-backend ──────────────────────────────────────────────
      - name: Clone vbwd-backend
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-backend
          ref: main
          path: vbwd-backend

      # ── 2. Clone plugin directly into vbwd-backend/plugins/taro ────
      - name: Clone plugin
        uses: actions/checkout@v4
        with:
          path: vbwd-backend/plugins/taro

      # ── 2b. Clone bot_base dependency (taro's bot consumer imports it) ────
      - name: Clone bot_base dependency
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-plugin-bot-base
          path: vbwd-backend/plugins/bot_base

      # ── 2c. Clone bot_telegram dependency (integration round-trip) ────
      - name: Clone bot_telegram dependency
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-plugin-bot-telegram
          path: vbwd-backend/plugins/bot_telegram

      # ── 2b. Clone chat plugin (taro runtime dependency) ──────────────────
      - name: Clone chat plugin
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-plugin-chat
          path: vbwd-backend/plugins/chat

      # ── 2c. Clone subscription dependency (taro declares dependencies=["subscription"]) ──
      - name: Clone subscription plugin
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-plugin-subscription
          path: vbwd-backend/plugins/subscription

      # ── 2d. Clone email (subscription's declared dependency) ──────────────
      - name: Clone email plugin
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-plugin-email
          path: vbwd-backend/plugins/email

      # ── 3. Style checks (black · flake8 · mypy) ───────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: vbwd-backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r vbwd-backend/requirements.txt

      - name: Style check — Black
        run: |
          black --check --diff \
            vbwd-backend/plugins/taro/ \
            --exclude='/(\.git|\.github|__pycache__|\.pytest_cache)/'

      - name: Style check — Flake8
        run: |
          flake8 vbwd-backend/plugins/taro/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=.git,.github,__pycache__,.pytest_cache

      - name: Style check — Mypy
        run: |
          PLUGIN_SRC=vbwd-backend/plugins/taro/src
          if [ -d "$PLUGIN_SRC" ]; then
            mypy "$PLUGIN_SRC" \
              --ignore-missing-imports \
              --follow-imports=silent \
              --no-error-summary \
              --python-version=3.11
          else
            echo "No src/ directory — skipping mypy."
          fi

      # ── 4. Start docker compose stack (API + postgres + redis) ────────────
      - name: Start services
        id: start-services
        working-directory: vbwd-backend
        run: |
          docker compose up -d --build
          echo "Waiting for API to become healthy..."
          for i in $(seq 1 30); do
            STATE=$(docker compose ps api --format '{{.State}}' 2>/dev/null || echo "unknown")
            echo "  attempt $i/30 — api state: $STATE"
            if [ "$STATE" = "running" ]; then
              echo "API is running."
              exit 0
            fi
            sleep 3
          done
          echo "API failed to reach running state. Logs:"
          docker compose logs --tail=50 api
          exit 1

      # ── 5. Install and activate plugin ────────────────────────────────────
      - name: Enable plugin
        working-directory: vbwd-backend
        run: |
          # taro declares dependencies=["subscription"]; enable its dependency
          # chain (email -> subscription) before taro so enable_plugin passes.
          docker compose exec -T api flask plugins enable email || true
          docker compose exec -T api flask plugins enable subscription || true
          docker compose exec -T api flask plugins enable taro \
            && echo "Plugin taro enabled." \
            || echo "Plugin taro already enabled or not registerable — continuing."

      # ── 6. Unit tests ──────────────────────────────────────────────────────
      - name: Run unit tests
        working-directory: vbwd-backend
        run: |
          mkdir -p test-results
          if [ -d "plugins/taro/tests/unit" ]; then
            TESTS_DIR="plugins/taro/tests/unit/"
          elif [ -d "plugins/taro/tests" ]; then
            TESTS_DIR="plugins/taro/tests/"
            IGNORE="--ignore=plugins/taro/tests/integration/"
          else
            echo "No unit tests — skipping."
            exit 0
          fi
          docker compose --profile test run --rm -T test \
            pytest $TESTS_DIR ${IGNORE:-} \
            -v --tb=short \
            --junit-xml=/app/test-results/unit.xml

      # ── 7. Integration tests ───────────────────────────────────────────────
      - name: Run integration tests
        if: steps.start-services.conclusion == 'success'
        working-directory: vbwd-backend
        run: |
          if [ -d "plugins/taro/tests/integration" ]; then
            echo "Container states before integration tests:"
            docker compose ps
            STATE=$(docker compose ps api --format '{{.State}}' 2>/dev/null || echo "unknown")
            if [ "$STATE" != "running" ]; then
              echo "API not running (state: $STATE) — showing logs:"
              docker compose logs --tail=50 api
              exit 1
            fi
            docker compose exec -T api pytest plugins/taro/tests/integration/ \
              -v --tb=short \
              --junit-xml=/app/test-results/integration.xml
          else
            echo "No integration tests — skipping."
          fi

      # ── 8. Upload artifacts ────────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-taro-${{ github.run_number }}
          path: vbwd-backend/test-results/
          if-no-files-found: ignore
          retention-days: 14

      # ── 9. Cleanup ─────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        working-directory: vbwd-backend
        run: docker compose down -v
